name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Self-check
        run: |
          python -m labauto.ui --self-check
          python -m scripts.caracterizacion_fotonica --self-test

      - name: Build PICBench.exe
        shell: powershell
        run: .\scripts\build_windows.ps1 -SkipInstall

      - uses: actions/upload-artifact@v4
        with:
          name: PICBench-Windows
          path: |
            release/PICBench.exe
            release/PICBench.exe.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "release/PICBench.exe" "release/PICBench.exe.sha256" --generate-notes --title "PICBench ${{ github.ref_name }}"
